name = "jtf-compliance-api"
main = "api-proxy.js"
compatibility_date = "2024-01-01"

[vars]
# Override these in Cloudflare dashboard → Workers → Settings → Variables
SUPABASE_URL = "https://YOUR-PROJECT.supabase.co"

# Secrets (set via: wrangler secret put SUPABASE_ANON_KEY)
# SUPABASE_ANON_KEY = set via wrangler secret

[[routes]]
pattern = "jtf-api.YOUR-DOMAIN.workers.dev/*"
zone_name = "YOUR-DOMAIN"
